spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: #E-mail
    password: #app password
    protocol: smtp
    properties:
      mail:
        debug: true
        smtp:
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          auth: true
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000
  thymeleaf:
    enable: true
envio:
  email:
    remetente: #E-mail remetente
    nomeRemetente: #Nome remetente

server:
  port: 8082